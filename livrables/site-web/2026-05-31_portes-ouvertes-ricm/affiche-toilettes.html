<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Signalétique Toilettes — JPO RICM 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700;900&family=Barlow:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 50px;
    min-height: 100vh;
    padding: 50px 20px;
    font-family: 'Barlow', sans-serif;
  }

  /* ========== A4 PAYSAGE ========== */
  .affiche {
    width: 297mm;
    height: 210mm;
    background: #1F3520;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.7);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .affiche::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('images/ricm-07.png') center / cover no-repeat;
    opacity: .04;
    pointer-events: none;
    z-index: 0;
  }

  .bandeau-top {
    position: absolute; top: 0; left: 0; right: 0;
    height: 10px; background: #C8B89A; z-index: 2;
  }
  .bandeau-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 10px; background: #C8B89A; z-index: 2;
  }

  .corner {
    position: absolute; width: 48px; height: 48px; z-index: 3;
  }
  .corner.tl { top: 20px; left: 20px; border-top: 3px solid rgba(200,184,154,.35); border-left: 3px solid rgba(200,184,154,.35); }
  .corner.tr { top: 20px; right: 20px; border-top: 3px solid rgba(200,184,154,.35); border-right: 3px solid rgba(200,184,154,.35); }
  .corner.bl { bottom: 20px; left: 20px; border-bottom: 3px solid rgba(200,184,154,.35); border-left: 3px solid rgba(200,184,154,.35); }
  .corner.br { bottom: 20px; right: 20px; border-bottom: 3px solid rgba(200,184,154,.35); border-right: 3px solid rgba(200,184,154,.35); }

  .insigne-zone {
    position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 2; display: flex; align-items: center; gap: 10px;
  }
  .insigne { width: 34px; height: 34px; object-fit: contain; opacity: .5; }
  .regiment-label {
    font-family: 'Oswald', sans-serif; font-weight: 500;
    font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: rgba(200,184,154,.45);
  }

  /* Contenu principal */
  .contenu {
    position: relative; z-index: 1;
    display: flex; flex-direction: row;
    align-items: center; justify-content: center;
    gap: 64px; width: 100%;
    padding: 24px 80px;
  }

  /* Zone gauche : icônes + label */
  .texte-zone {
    display: flex; flex-direction: column;
    align-items: center; gap: 18px;
  }

  .pictos-row {
    display: flex; flex-direction: row;
    align-items: flex-end; gap: 32px;
  }

  .picto-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }

  .picto-item i {
    font-size: 120px;
    color: #C8B89A;
    line-height: 1;
    filter: drop-shadow(0 4px 16px rgba(200,184,154,.3));
  }

  .picto-sep {
    width: 2px; height: 130px; align-self: center;
    background: rgba(200,184,154,.2); border-radius: 2px;
  }

  .label {
    font-family: 'Oswald', sans-serif; font-weight: 900;
    font-size: 88px; line-height: 1; letter-spacing: .06em;
    text-transform: uppercase; color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,.5);
  }

  /* Divider vertical central */
  .divider {
    width: 3px; height: 160px; flex-shrink: 0;
    background: rgba(200,184,154,.3); border-radius: 2px;
  }

  /* Flèche */
  .fleche {
    width: 220px; height: 220px; color: #C8B89A;
    filter: drop-shadow(0 6px 24px rgba(200,184,154,.4));
  }

  /* ========== A4 PORTRAIT ========== */
  .affiche-portrait {
    width: 210mm; height: 297mm;
    background: #1F3520;
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.7);
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 36px;
  }
  .affiche-portrait::before {
    content: ""; position: absolute; inset: 0;
    background: url('images/ricm-07.png') center / cover no-repeat;
    opacity: .04; pointer-events: none; z-index: 0;
  }
  .affiche-portrait .bandeau-top,
  .affiche-portrait .bandeau-bottom {
    position: absolute; left: 0; right: 0;
    height: 10px; background: #C8B89A; z-index: 2;
  }
  .affiche-portrait .bandeau-top { top: 0; }
  .affiche-portrait .bandeau-bottom { bottom: 0; }

  .contenu-portrait {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 30px;
  }

  .affiche-portrait .pictos-row { gap: 40px; }
  .affiche-portrait .picto-item i { font-size: 130px; }
  .affiche-portrait .picto-sep { height: 140px; }
  .affiche-portrait .label {
    font-family: 'Oswald', sans-serif; font-weight: 900;
    font-size: 76px; letter-spacing: .06em; text-transform: uppercase;
    color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  .affiche-portrait .fleche {
    width: 260px; height: 260px; color: #C8B89A;
    filter: drop-shadow(0 6px 24px rgba(200,184,154,.4));
  }

  /* ========== PRINT ========== */
  @media print {
    body { background: white; padding: 0; margin: 0; }
    .affiche, .affiche-portrait {
      border-radius: 0; box-shadow: none;
      page-break-after: always;
    }
  }

  .section-label {
    font-family: 'Barlow', sans-serif; font-size: 13px;
    color: rgba(200,184,154,.6); letter-spacing: .12em;
    text-transform: uppercase; text-align: center; margin-top: 10px;
  }
</style>
</head>
<body>

<!-- ====== PAYSAGE A4 ====== -->
<div>
  <div class="affiche">
    <div class="bandeau-top"></div>
    <div class="bandeau-bottom"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="insigne-zone">
      <img class="insigne" src="images/insigne-ricm.png" alt="RICM" />
      <span class="regiment-label">RICM — JPO 2026</span>
    </div>

    <div class="contenu">
      <div class="texte-zone">
        <div class="pictos-row">
          <div class="picto-item">
            <i class="fa-solid fa-person"></i>
          </div>
          <div class="picto-sep"></div>
          <div class="picto-item">
            <i class="fa-solid fa-person-dress"></i>
          </div>
        </div>
        <div class="label">Toilettes</div>
      </div>

      <div class="divider"></div>

      <svg class="fleche" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 110 L152 110" stroke="currentColor" stroke-width="26" stroke-linecap="round"/>
        <path d="M118 60 L196 110 L118 160" stroke="currentColor" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>
  <p class="section-label">A4 Paysage</p>
</div>

<!-- ====== PORTRAIT A4 ====== -->
<div>
  <div class="affiche-portrait">
    <div class="bandeau-top"></div>
    <div class="bandeau-bottom"></div>

    <div class="contenu-portrait">
      <img style="width:50px;height:50px;object-fit:contain;opacity:.45;position:relative;z-index:1;" src="images/insigne-ricm.png" alt="RICM" />

      <div class="pictos-row">
        <div class="picto-item">
          <i class="fa-solid fa-person" style="font-size:130px;color:#C8B89A;line-height:1;filter:drop-shadow(0 4px 16px rgba(200,184,154,.3));"></i>
        </div>
        <div class="picto-sep"></div>
        <div class="picto-item">
          <i class="fa-solid fa-person-dress" style="font-size:130px;color:#C8B89A;line-height:1;filter:drop-shadow(0 4px 16px rgba(200,184,154,.3));"></i>
        </div>
      </div>

      <div class="label" style="font-family:'Oswald',sans-serif;font-weight:900;font-size:76px;letter-spacing:.06em;text-transform:uppercase;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.5);">Toilettes</div>

      <svg style="width:260px;height:260px;color:#C8B89A;filter:drop-shadow(0 6px 24px rgba(200,184,154,.4));" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 110 L152 110" stroke="currentColor" stroke-width="26" stroke-linecap="round"/>
        <path d="M118 60 L196 110 L118 160" stroke="currentColor" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>
  <p class="section-label">A4 Portrait</p>
</div>

</body>
</html>
