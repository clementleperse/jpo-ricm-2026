<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Toilettes Paysage Gauche</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@900&display=swap');
  @page { size: A4 landscape; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 297mm; height: 210mm; overflow: hidden; }
  body { background: #1F3520; font-family: 'Oswald', sans-serif; }

  .affiche {
    width: 297mm; height: 210mm;
    background: #1F3520;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .affiche::before {
    content: ""; position: absolute; inset: 0;
    background: url('../images/ricm-07.png') center / cover no-repeat;
    opacity: .04; pointer-events: none; z-index: 0;
  }
  .bandeau { position: absolute; left: 0; right: 0; height: 10px; background: #C8B89A; z-index: 2; }
  .bandeau.top { top: 0; } .bandeau.bot { bottom: 0; }
  .corner { position: absolute; width: 48px; height: 48px; z-index: 3; }
  .corner.tl { top: 20px; left: 20px; border-top: 3px solid rgba(200,184,154,.35); border-left: 3px solid rgba(200,184,154,.35); }
  .corner.tr { top: 20px; right: 20px; border-top: 3px solid rgba(200,184,154,.35); border-right: 3px solid rgba(200,184,154,.35); }
  .corner.bl { bottom: 20px; left: 20px; border-bottom: 3px solid rgba(200,184,154,.35); border-left: 3px solid rgba(200,184,154,.35); }
  .corner.br { bottom: 20px; right: 20px; border-bottom: 3px solid rgba(200,184,154,.35); border-right: 3px solid rgba(200,184,154,.35); }
  .insigne-zone {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    z-index: 2; display: flex; align-items: center; gap: 10px;
  }
  .insigne { width: 32px; height: 32px; object-fit: contain; opacity: .45; }
  .reg { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: rgba(200,184,154,.45); font-weight: 500; }

  .contenu {
    position: relative; z-index: 1;
    display: flex; flex-direction: row; align-items: center; justify-content: center;
    gap: 60px; padding: 24px 80px;
  }
  .texte-zone { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .pictos-row { display: flex; flex-direction: row; align-items: flex-end; gap: 28px; }
  .picto-item i { font-size: 120px; color: #C8B89A; line-height: 1; }
  .picto-sep { width: 2px; height: 120px; align-self: center; background: rgba(200,184,154,.2); border-radius: 2px; }
  .label { font-weight: 900; font-size: 90px; line-height: 1; letter-spacing: .06em; text-transform: uppercase; color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,.5); }
  .divider { width: 3px; height: 160px; flex-shrink: 0; background: rgba(200,184,154,.3); border-radius: 2px; }
  .fleche { width: 210px; height: 210px; color: #C8B89A; }
</style>
</head>
<body>
<div class="affiche">
  <div class="bandeau top"></div>
  <div class="bandeau bot"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="insigne-zone">
    <img class="insigne" src="../images/insigne-ricm.png" alt="" />
    <span class="reg">RICM — JPO 2026</span>
  </div>
  <div class="contenu">
    <!-- Flèche gauche en premier -->
    <svg class="fleche" viewBox="0 0 220 220" fill="none">
      <path d="M202 110 L68 110" stroke="currentColor" stroke-width="26" stroke-linecap="round"/>
      <path d="M102 60 L24 110 L102 160" stroke="currentColor" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="divider"></div>
    <div class="texte-zone">
      <div class="pictos-row">
        <div class="picto-item"><i class="fa-solid fa-person"></i></div>
        <div class="picto-sep"></div>
        <div class="picto-item"><i class="fa-solid fa-person-dress"></i></div>
      </div>
      <div class="label">Toilettes</div>
    </div>
  </div>
</div>
</body>
</html>
